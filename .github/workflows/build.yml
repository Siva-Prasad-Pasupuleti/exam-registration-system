name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Spring Boot Application
        working-directory: backend
        run: mvn clean package

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload WAR to S3
        run: |
          aws s3 cp \
            backend/target/exam-registration-system.war \
            s3://${{ secrets.S3_BUCKET }}/exam-registration-system.war

      - name: Deploy to WildFly via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Role,Values=wildfly" \
            --parameters commands="/opt/deploy/deploy-war.sh" \
            --region ${{ secrets.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          sleep 20

          aws ssm list-command-invocations \
            --command-id $COMMAND_ID \
            --details \
            --region ${{ secrets.AWS_REGION }}
